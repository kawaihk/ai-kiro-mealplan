# ============================================================
# IT試験用プロファイル設定（Docker Compose / PostgreSQL 接続）
#
# 使用方法:
#   コンテナ内: SPRING_PROFILES_ACTIVE=it で自動適用
#   ローカル手動起動: mvn spring-boot:run -Dspring-boot.run.profiles=it
#
# 前提: docker compose up -d で db コンテナが起動済みであること
# ============================================================

# ------------------------------------------------------------
# データソース（PostgreSQL — Docker Compose の db サービス）
# 接続情報は環境変数で注入（docker-compose.yml の environment 参照）
# ------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aimealplan_it}
spring.datasource.username=${DB_USERNAME:aimealplan}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ------------------------------------------------------------
# JPA / Hibernate
# IT試験ごとにテーブルを再作成してデータをクリーンに保つ
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ------------------------------------------------------------
# サーバー設定
# ------------------------------------------------------------
server.port=8080
